file_version: 1
category:
  id: block_party
  name: "Block Party"
  description:
    - "Achievements tied to Block Party."
  icon: Wool_Pink
  sort_order: 30

achievements:
  dancefloor_rookie:
    name: "Dancefloor Rookie"
    description:
      - "Play Block Party matches."
    icon: Wool_White
    phases:
      1:
        name: "First track"
        description:
          - "Play your first match."
        conditions:
          - "{bluearcade_stat_module_block_party_games_played} >= 1"
        rewards:
          commands:
            - "baa credits --action=give --target={player} --amount=10"
            - "baa xp --action=give --target={player} --amount=10"
          messages:
            - "  <gold>C</gold> <yellow>+10 credits</yellow>"
            - "  <purple>XP</purple> <light_purple>+10 XP</light_purple>"
      2:
