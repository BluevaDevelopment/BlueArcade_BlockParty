# Block Party Module Settings
# Songs from: https://github.com/nickg2/NBSsongs 

file_version: 4
# Visual representation in menus
menus:
  vote:
    item: Stone

gameplay:
  # How far below the lowest floor a player must fall to be eliminated
  elimination_margin: 1.0
  # Seconds to let music play before revealing the target block
  initial_music_time: 3.0
  # Seconds players have to find the target at the start of the match
  search_time: 12.0
  # Seconds removed from the search time every round
  decrease_time: 1.0
  # Minimum search time (seconds)
  min_search_time: 0.5
  # Delay (ticks) after collapse before the next round starts
  round_pause_ticks: 60
  # Slot where the target block preview is given (-1 to disable)
  target_item_slot: 4
  # Whether to hand out the target block item
  give_target_item: true
  # If true, the module will honor basic.time from the arena data and end when it is reached
  respect_max_game_time: false
  falling_blocks:
    # Whether to spawn a falling shard when a wrong block disappears
    enabled: true
    downward_velocity: 0.3
    horizontal_randomness: 0.08
  # Game mode players will be put in when game starts
  game_mode: Adventure

particles:
  region:
    enabled: true
    type: NOTE
    count: 6
    spacing: 3.5
    speed: 0.02
  collapse:
    enabled: false
    type: FLAME
    count: 10
    spread: 0.35
    speed: 0.1

fallback_pattern:
  # Configure block IDs that exist on your Hytale server
  # These are basic blocks that should work on any server
  materials:
    - Stone
    - Sand
    - Dirt
    - Wood
    - Grass

powerups:
  enabled: true
  spawn_interval_ticks: 200
  max_active: 2
  item: Stone
  bonus_time_ticks: 40
  speed:
    duration_ticks: 160
    amplifier: 1
  patch:
    radius: 2
  particles:
    enabled: true
    type: WITCH
    count: 12
    spread: 0.35
    speed: 0.12

music:
  # Block Party ships with 16 bundled .midi songs that are automatically extracted
  # to the module's music folder on first start. You can add your own .midi files
  # to the music folder at any time; they will be picked up on the next reload.
  # Music folder: /BlueArcade/modules/block_party/music/

# Runtime-generated floor patterns. Enable this per arena with:
# /baa game [arena_id] block_party pattern type procedural
procedural_patterns:
  # Avoid selecting one of the most recently used template types.
  no_repeat: 3
  # Minimum number of pattern cells that should fit on the shortest side of the floor.
  # Higher values produce smaller cells; lower values produce larger cells.
  scale:
    min_cells_per_side: 3
  # A target color must cover at least this percentage of the floor area when possible.
  min_target_area_percent: 25
  difficulty:
    # More colors are introduced as rounds progress.
    initial_colors: 4
    max_colors: 16
    color_increase_every: 2

# Game items (optional)
items:
  # Items to give players on game start
  # Format: ITEM_ID:AMOUNT:SLOT
  starting_items: []

# Potion effects (optional)
effects:
  # Effects to give players during the game
  # Format: EFFECT_TYPE:DURATION_TICKS:AMPLIFIER
  starting_effects:
    - "NIGHT_VISION:999999:0"

  # Effects when player respawns
  # Format: EFFECT_TYPE:DURATION_TICKS:AMPLIFIER
  respawn_effects:
    - "NIGHT_VISION:999999:0"
